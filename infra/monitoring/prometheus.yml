global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    project: "graphrl-sec"
    env: "local"

# ============================================================
# Alerting (extend later with Alertmanager)
# ============================================================
alerting:
  alertmanagers: []

# ============================================================
# Scrape Configs
# ============================================================
scrape_configs:

  # GraphRL-Sec FastAPI backend — exposes /metrics
  - job_name: "graphrl-api"
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  # Redpanda broker metrics
  - job_name: "redpanda"
    static_configs:
      - targets: ["redpanda:9644"]
    metrics_path: "/metrics"

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
